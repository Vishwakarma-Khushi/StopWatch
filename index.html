<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <label id="title">StopWatch</label><br>
    <div id="container">
        <label id="stopwatch">00:00:00:00</label>
        <div>
            <button onclick="startTimer()" id="startTimer">START</button>
            <button onclick="stopTimer()" id="stopTimer">STOP</button>
        </div>
        <button onclick="resetTimer()" id="resetTimer">RESET</button>
    </div>
    
    <script src="function.js"></script>
</body>
</html>
